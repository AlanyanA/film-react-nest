# Docker Compose для продакшен-сервера (без локальной сборки).
# Образы подтягиваются из GitHub Container Registry после push в main.

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - app-network

  backend:
    image: ghcr.io/${IMAGE_OWNER}/film-react-nest-backend:latest
    container_name: backend
    restart: unless-stopped
    environment:
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      LOGGER_TYPE: ${LOGGER_TYPE}
      DEBUG: ${DEBUG}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: ghcr.io/${IMAGE_OWNER}/film-react-nest-frontend:latest
    container_name: frontend
    restart: unless-stopped
    volumes:
      - frontend_dist:/output
    networks:
      - app-network

  nginx:
    image: ghcr.io/${IMAGE_OWNER}/film-react-nest-nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

volumes:
  postgres_data:
  pgadmin_data:
  frontend_dist:

networks:
  app-network:
    driver: bridge
